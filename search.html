<style>
	body {
		font-family: 'Helvetica', 'Arial', sans-serif;
		overscroll-behavior: none;
		margin: 0px;
		background-color: #f3f3f3;
		background-attachment: fixed;
		background-size: cover;
	}

	#mobile-search {
		margin-left: 15%;
		margin-top: 5%;
		width: 70%;
		height: 50px;
		font-size: 30px;
		background-color: #fafafa;
		border: 1px solid #d5d9d9;
		border-radius: 2px;
		padding-left: 10px;
		padding-right: 10px;
		-webkit-box-sizing: border-box;
		-moz-box-sizing: border-box;
		box-sizing: border-box;
		display: none;
	}

	.button-grid {
		width: 70%;
		max-width: 1200px;
		height: 40px;
		margin: auto;
		display: grid;
		grid-template-columns: 4fr 1fr;
		gap: 10px;
		padding-top: 20px;
		padding-bottom: 20px;
		justify-items: center;
	}

	.prev-next-btns {
		width: 100%;
		height: 40px;
		margin: auto;
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 5px;
		align-items: center;
	}

	button:not(.btn) {
		border: 1px solid #d5d9d9;
		border-radius: 8px;
		box-shadow: rgba(213, 217, 217, .5) 0 2px 5px 0;
		cursor: pointer;
		font-size: 13px;
		width: 100%;
		height: 35px;
		min-width: 85px;
	}

	button:hover {
		background-color: var(--light-accent);
	}

	button:focus {
		border-color: #171717;
		box-shadow: rgba(213, 217, 217, .5) 0 2px 5px 0;
		outline: 0;
	}

	button:disabled, select:disabled {
		cursor: auto;
		background-color: var(--light-accent);
		font-style: italic;
		box-shadow: none;
		color: var(--mid-accent);
	}

	.button-grid .results-text {
		margin-right: -3px;
	}

	.button-grid .select-text {
		width: 100%;
		display: flex;
		align-items: center;
		justify-content: left;
		gap: 8px;
		font-size: 14.5px;
		text-align: center;
	}

	select {
		background-color: #fafafa;
		border: 1px solid #d5d9d9;
		border-radius: 8px;
		box-shadow: rgba(213, 217, 217, .5) 0 2px 5px 0;
		text-align: center;
		color: #171717;
		font-size: 13px;
		height: 30px;
	}

	.grid-container {
		display: grid;
		grid-template-columns: auto;
		max-width: 1200px;
		margin: auto;
	}

	@media (max-width: 750px) {
		.image-grid-container {
			grid-template-columns: 1fr 1fr;
		}
	}

	.image-grid-container {
		display: grid;
		grid-template-columns: 1fr 1fr 1fr 1fr;
		width: 70%;
		max-width: 1200px;
		margin: auto;
		gap: 5px;
		justify-items: center;
	}

	@media (max-device-width: 750px) {
		.image-grid-container {
			grid-template-columns: 1fr 1fr;
		}

		#mobile-search {
			display: block;
		}
	}

	.image-grid {
		width: 70%;
		margin: auto;
		display: grid;
		grid-template-columns: minmax(150px, 1fr) minmax(300px, 2fr);
		gap: 50px;
		padding-bottom: 10px;
		justify-items: left;
	}

	.image-grid img {
		position: relative;
	}

	.card-image {
		float: left;
		width: 100%;
		height: auto;
		display: block;
		border-radius: 9px;
		transition: 0.2s;
	}

	.card-image:hover {
		filter: brightness(0.7);
	}

	.card-text {
		padding-top: 20px;
		padding-bottom: 20px;
		background: var(--bg-color);
		width: 100%;
		border: 1px solid var(--light-accent);
		border-top: 3px solid var(--opposite);
		border-bottom: 3px solid var(--opposite);
		border-radius: 6px;
		height: fit-content;
		min-height: 75%;
		margin-top: 3%;
	}

	.card-text div {
		white-space: normal;
		font-size: 15px;
		padding-bottom: 10px;
		padding-left: 12px;
		padding-right: 12px;
		line-height: 155%;
	}

	.card-text .name-cost {
		font-size: 20px;
		font-family: beleren;
		white-space: pre-wrap;
	}

	.card-text .type {
		font-size: 16px;
	}

	.card-text .pt {
		font-weight: bold;
	}

	.card-text br {
		content: "";
		display: block;
		margin-bottom: 5px;
	}

	.img-container {
		position: relative;
		width: 100%;
		align-self: center;
	}

	.img-container img {
		width: 100%;
		height: auto;
	}

	.img-container .btn {
		background-color: #ffffffaa;
		background-size: contain;
		background-position: center;
		width: 15%;
		height: 11%;
		cursor: pointer;
		border: none;
		position: absolute;
		left: 50%;
		top: 48%;
		transform: translate(170%, -150%);
		opacity: 0.8;
		border-radius: 100%;
		border: 2px solid black;
		padding: 3px;
	}

	.img-container .btn:hover {
		background-size: contain;
		background-position: center;
		background-color: #ffffff;
	}

	.img-container .hidden-text {
		position: absolute;
		font-family: Beleren;
		top: 5%;
		left: 9%;
		font-size: .97vw;
		color: rgba(0, 0, 0, 0);
	}

	#modal-container {
		display: none;
		position: fixed;
		z-index: 1;
		padding-top: 70px;
		left: 0;
		top: 0;
		width: 100%;
		height: 100%;
		overflow: auto;
		background-color: rgb(0, 0, 0);
		background-color: rgba(0, 0, 0, 0.4);
	}

	#modal-content {
		background-color: #fefefe;
		margin: auto;
		padding: 20px;
		border: 1px solid #888;
		width: 50%;
		border-radius: 10px;
		border: solid #777 3px;
		margin-bottom: 70px;
	}

	.no-results {
		display: none;
		text-align: center;
		padding-top: 100px;
		padding-bottom: 100px;
		width: 100%;
	}
	.no-results img {
		width: 150px;
		margin-bottom: 20px;
		opacity: 0.4;
		filter: drop-shadow(0 0 4px #000);
	}
	.no-results h1 {
		font-family: Beleren;
		color: color-mix(in srgb, var(--text-color), transparent 40%);
		margin: 0;
		font-size: 40px;
	}
	.no-results p {
		color: color-mix(in srgb, var(--text-color), transparent 40%);
		font-size: 18px;
		margin-top: 10px;
	}
</style>

	<div class="button-grid">

				id="display" class="popout">

	<script src="src/js/background.js"></script>

	<script>
		let page = 0;
		let pageCount = 30;
		let search_results = [];
		let card_list_arrayified = [];
		let specialchars = "";
		let sets_json = {};
		let all_cards_stats;
		let changelogs;
		const delay = ms => new Promise(res => setTimeout(res, ms));

		document.addEventListener("DOMContentLoaded", async function () {
			await fetch('/lists/all-cards.json')
				.then(response => response.json())
				.then(json => {
					card_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(json => {
					set_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/resources/replacechars.txt')
				.then(response => response.text())
				.then(text => {
					specialchars = text;
				}).catch(error => console.error('Error:', error));

			await fetch('/data/changelogs.json')
				.then(response => response.json())
				.then(json => {
					_changelogs = json;
				}).catch(error => console.error('Error:', error));

			changelogs = Object.values(_changelogs).join('\n');

			card_list_arrayified = card_list.cards;


			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(data => {
					sets_json = data;
				}).catch(error => console.error('Error:', error));

			await fetch('/lists/banlist.json')
				.then(response => response.json())
				.then(json => {
					banlist = json;
				}).catch(error => console.error('Error:', error));

			
			let all_tags = new Set();
			card_list_arrayified.forEach(card => {
				if (card.notes) {
					const tagMatches = card.notes.matchAll(/!tag(?:<\w+>)?\s+([^\s\n\b]+)/g);
					for (const match of tagMatches) {
						if (match[0].includes('!tag<')) continue;
						all_tags.add(match[1].replace(/;$/, ''));
					}
				}
			});

			const searchInput = document.getElementById("search");
			const tagDropdown = document.getElementById("tag-dropdown");

			// Create a mirror element for position calculation
			const mirror = document.createElement("div");
			Object.assign(mirror.style, {
				position: "absolute",
				visibility: "hidden",
				whiteSpace: "pre",
				font: getComputedStyle(searchInput).font,
				padding: "0", // No padding for pure text measurement
				border: "none",
				boxSizing: "content-box"
			});
			document.body.appendChild(mirror);

			if (searchInput && tagDropdown) {
				tagDropdown.style.width = "auto";
				tagDropdown.style.minWidth = "75px";
				tagDropdown.style.maxWidth = "300px";
				tagDropdown.style.maxHeight = "200px";
				tagDropdown.style.overflowY = "auto";

				const updateDropdown = function() {
					const value = searchInput.value;
					const cursorPosition = searchInput.selectionStart;
					
					// Find the tag: prefix immediately preceding the cursor
					const lastTagIndex = value.substring(0, cursorPosition).lastIndexOf("tag:");
					
					if (lastTagIndex !== -1) {
						const queryStart = lastTagIndex + 4;
						const query = value.substring(queryStart, cursorPosition);
						
						if (!query.includes(" ")) {
							const filteredTags = Array.from(all_tags).filter(tag => tag.toLowerCase().startsWith(query.toLowerCase())).sort();
							if (filteredTags.length > 0) {
								tagDropdown.innerHTML = "";
								filteredTags.forEach(tag => {
									const div = document.createElement("div");
									div.innerText = tag;
									div.style.padding = "5px 10px";
									div.style.cursor = "pointer";
									div.style.whiteSpace = "nowrap";
									div.onmouseover = () => div.style.background = "#f0f0f0";
									div.onmouseout = () => div.style.background = "white";
									div.onclick = () => {
										const newValue = value.substring(0, queryStart) + tag + " " + value.substring(cursorPosition);
										searchInput.value = newValue;
										tagDropdown.style.display = "none";
										searchInput.focus();
										const newCursorPos = queryStart + tag.length + 1;
										searchInput.setSelectionRange(newCursorPos, newCursorPos);
									};
									tagDropdown.appendChild(div);
								});

								// Calculate position
								mirror.textContent = value.substring(0, lastTagIndex + 4);
								const textWidth = mirror.getBoundingClientRect().width;
								const inputPaddingLeft = parseFloat(getComputedStyle(searchInput).paddingLeft) || 0;
								
								tagDropdown.style.left = Math.min(textWidth + inputPaddingLeft, searchInput.offsetWidth - tagDropdown.offsetWidth) + "px";
								tagDropdown.style.display = "block";
								return;
							}
						}
					}
					tagDropdown.style.display = "none";
				};

				searchInput.addEventListener("input", updateDropdown);
				searchInput.addEventListener("click", updateDropdown);
				searchInput.addEventListener("keyup", updateDropdown);

				document.addEventListener("click", function(e) {
					if (e.target !== searchInput && e.target !== tagDropdown) {
						tagDropdown.style.display = "none";
					}
				});
			}

			if (sessionStorage.getItem("display") != "cards-only") {
				cardGrid = document.getElementById("grid");
			}
			else {
				cardGrid = document.getElementById("imagesOnlyGrid");
			}
			
			all_cards_stats = await getCardStats();
			card_list_arrayified.sort(compareFunction);

			// refresh page values
			const params = new URLSearchParams(window.location.search);
			page = params.get("page") ? params.get("page") : 0;
			searchInput.value = params.get("search") ? decodeURIComponent(params.get("search")) : "";

			if (sessionStorage.getItem("sortMethod")) {
				document.getElementById("sort-by").value = sessionStorage.getItem("sortMethod");
			}
			if (sessionStorage.getItem("display")) {
				document.getElementById("display").value = sessionStorage.getItem("display");
			}

			displayStyle = document.getElementById("display").value;
			setCardView();

			defaultSetting('settings.autosave', 'On');
			defaultSetting('settings.searchalias', 'On');
			defaultSetting('settings.exportcube', 'On');
			defaultSetting('settings.gradient', 'Random-Card');

			// initial search on load
			preSearch(false);
		});

		function isBannedCard(card_name) {
			return banlist.banned.includes(card_name);
		}

		function tokenize(text) {
			let tokens = [];

			for (let i = 0; i < text.length; i++) {
				if (i < text.length - 1) {
					if (text[i + 1] == '/') {
						tokens.push(text.substring(i, i + 3));
						i = i + 2;
					}
					else if (isDecimal(text[i]) && isDecimal(text[i + 1])) {
						tokens.push(text.substring(i, i + 2));
						i = i + 1;
					}
					else {
						tokens.push(text[i]);
					}
				}
				else {
					tokens.push(text[i]);
				}
			}

			return tokens;
		}

		function isDecimal(char) {
			return char >= '0' && char <= '9';
		}

		function symbolize(text) {
			//This isn't needed now that the { & } are put into the cost & text by the exporter
			//let tokens = tokenize(text);
			//let symText = "";
			//for (const token of tokens)
			//{
			//	symText = symText + "{" + token + "}";
			//}

			return formatTextHTML(text);
		}

		function formatTextHTML(str) {
			if (!str)
				return "";
			str = str.replace(/[{]([^}]+)[}]/g, function (matched, _1) {
				let letters = _1.toLowerCase()
				return `<span class="mana mana-cost ${isText(letters)} mana-` + letters + '"></span>';
			})
			return str;
		}

		function isText(l) {
			if (l.includes("v") || l.includes("e")) {
				return "popout";
			}
			return "";
		}

		function displayChangeListener() {
			displayStyle = document.getElementById("display").value;
			sessionStorage.setItem("display", displayStyle);
			sessionStorage.setItem("sortMethod", document.getElementById("sort-by").value);

			setCardView();

			preSearch(false);
		}

		document.getElementById("sort-by").onchange = displayChangeListener;
		document.getElementById("display").onchange = displayChangeListener;
		document.getElementById("sort-order").onchange = displayChangeListener;

		window.addEventListener('popstate', function (event) {
			let params = decodeURIComponent(window.location.href.indexOf("?search") == -1 ? "" : window.location.href.substring(window.location.href.indexOf("?search") + 8), (window.location.href.indexOf("page=") == -1 ? window.location.href.length : window.location.href.indexOf("page=")));
			searchInput.value = (params.indexOf("&page=") == -1 ? params.replaceAll("+", " ") : params.substring(0, params.indexOf("&page=")).replaceAll("+", " "));
			page = window.location.href.indexOf("page=") == -1 ? 0 : parseInt(window.location.href.substring(window.location.href.indexOf("page=") + 5)) - 1;

			preSearch(false);
		});

		function setCardView() {
			imagesOnlyGrid.style.display = displayStyle == "cards-only" ? '' : 'none';
			grid.style.display = displayStyle == "cards-only" ? 'none' : '';
		}

		function preSearch(setNewState) {
			const searchTerms = document.getElementById("search").value.toLowerCase();
			const tokens = tokenizeTerms(searchTerms) || [];
			const sortBySelect = document.getElementById("sort-by");
			const sortOrderSelect = document.getElementById("sort-order");

			sortBySelect.disabled = false;
			sortOrderSelect.disabled = false;

			tokens.forEach(token => {
				if (token.startsWith("sort:")) {
					const val = token.substring(5);
					const map = {
						"name": "name",
						"set": "set-code",
						"mv": "mv",
						"color": "color",
						"rarity": "rarity",
						"cube": "cube"
					};
					if (map[val]) {
						const option = Array.from(sortBySelect.options).find(opt => opt.value === map[val]);
						if (option) {
							sortBySelect.value = map[val];
							sortBySelect.disabled = true;
						}
					}
				}
				if (token.startsWith("direction:")) {
					const val = token.substring(10);
					const map = {
						"asc": "ascending",
						"desc": "descending"
					};
					if (map[val]) {
						const option = Array.from(sortOrderSelect.options).find(opt => opt.value === map[val]);
						if (option) {
							sortOrderSelect.value = map[val];
							sortOrderSelect.disabled = true;
						}
					}
				}
			});
			
			card_list_arrayified.sort(compareFunction);
			if (document.getElementById("sort-order").value == "descending") {
				card_list_arrayified.reverse();
			}
			search_results = [];
			page = setNewState ? 0 : page;

			search(setNewState);
		}

		async function search(setNewState) {
			searchTerms = searchInput.value.toLowerCase();

			if (searchTerms != "") {
				if (setNewState) {
					let url = (window.location.href.indexOf("?") == -1 ? new URL(window.location.href) : new URL(window.location.href.substring(0, window.location.href.indexOf("?"))));
					let params = new URLSearchParams(url.search);
					params.append("search", searchTerms);
					history.pushState({}, '', url.pathname + '?' + params.toString());
				}
			}
			else {
				if (setNewState) {
					let url = (window.location.href.indexOf("?") == -1 ? new URL(window.location.href) : new URL(window.location.href.substring(0, window.location.href.indexOf("?"))));
					let params = new URLSearchParams(url.search);
					params.delete("search");
					history.pushState({}, '', url.pathname + '' + params.toString());
				}
			}

			if (displayStyle == "cards-only") {
				cardGrid = document.getElementById("imagesOnlyGrid");
			}
			else {
				cardGrid = document.getElementById("grid");
			}
			cardGrid.innerHTML = "";

			await fetch('/resources/search-replace.json')
				.then(response => response.json())
				.then(json => {
					search_replace = json;
				}).catch(error => console.error('Error:', error));

			for (const to_replace in search_replace) {
				const replace_with = search_replace[to_replace];
				searchTerms = searchTerms.replaceAll(to_replace, replace_with);
			}

			for (const card of card_list_arrayified) {
				if (card.shape.includes("token") && !searchTerms.includes("+t:token") && !searchTerms.includes("t:token")) {
					continue;
				}

				if (card.type.includes("Basic") && !searchTerms.includes("+t:basic") && !searchTerms.includes("t:basic")) {
					continue;
				}

				searched = await searchAllTokens(card, tokenizeTerms(searchTerms));

				if (searched && (!containsCard(search_results, card) || searchTerms.includes("include:extras") || searchTerms.includes("include:printings") || searchTerms.includes("include:prints"))) {
					search_results.push(card);
				}
			}

			if (search_results.length == 1) {
				const card = search_results[0];
				window.location.href = `https://voyager-mtg.github.io/card?set=${card.set}&num=${card.number}&name=${card.card_name.replaceAll(" ", "+")}`; //https://voyager-mtg.github.io/card?set=PVR&num=304&name=Pool+of+Becoming
			}

			if (searchTerms != "") {
				document.getElementById("results-text").innerText = search_results.length + (search_results.length == 1 ? " result found." : " results found.");
			}
			else {
				document.getElementById("results-text").innerText = "";
			}

			if (search_results.length == 0) {
				document.getElementById("no-results").style.display = "block";
				document.getElementById("footer").style.display = "none";
			} else {
				document.getElementById("no-results").style.display = "none";
				document.getElementById("footer").style.display = "grid";
			}

			if (page != 0) {
				document.getElementById("prevBtn").disabled = false;
				document.getElementById("prevBtn-footer").disabled = false;
			}
			else {
				document.getElementById("prevBtn").disabled = true;
				document.getElementById("prevBtn-footer").disabled = true;
			}

			// set text of Next to match number of displayed images
			displayStyle = document.getElementById("display").value;
			pageCount = displayStyle == "cards-only" ? 60 : 30;
			document.getElementById("nextBtn").innerText = "Next " + pageCount + " >";
			document.getElementById("nextBtn-footer").innerText = "Next " + pageCount + " >";

			// really awesome code block to fix the URL when switching from Cards + Text view to Cards Only view
			while ((pageCount * page) > search_results.length) {
				page = page - 1;

				let url = (window.location.href.indexOf("page=") == -1 ? new URL(window.location.href) : new URL(window.location.href.substring(0, window.location.href.indexOf("page="))));
				let params = new URLSearchParams(url.search);
				params.append("page", page + 1);
				history.replaceState({}, '', url.pathname + '?' + params.toString());
			}

			for (let i = (pageCount * page); i < Math.min((pageCount * (page + 1)), search_results.length); i++) {
				cardGrid.appendChild(gridifyCard(search_results[i], document.getElementById("display").value == "cards-text"));
			}

			if (search_results.length <= (pageCount * (page + 1))) {
				document.getElementById("nextBtn").disabled = true;
				document.getElementById("nextBtn-footer").disabled = true;
			}
			else {
				document.getElementById("nextBtn").disabled = false;
				document.getElementById("nextBtn-footer").disabled = false;
			}

			if (search_results.length < 10) {
				document.getElementById("nextBtn-footer").style.display = "none";
				document.getElementById("prevBtn-footer").style.display = "none";
			}
			if (search_results.length > 10) {
				document.getElementById("nextBtn-footer").style.display = "";
				document.getElementById("prevBtn-footer").style.display = "";
			}
		}

		function formatText(text) {
			let new_text = text;
			new_text = new_text.replaceAll(/"(.*?)"/g, function (_1) {
				return "<b>" + _1 + "</b>";
			});
			new_text = new_text.replaceAll(/\"([^ {]+?[:=][^ ]+?)\"/g, function (_1, _2) {
				return "<a target=\"blank\" href=\"/search?search=" + encodeURI(_2.replaceAll(/<.+?>/g, "")) + "\">" + _1 + "</a>";
			});
			new_text = new_text.replaceAll(/\[(.+?[:=].+?)\]/g, function (_1, _2) {
				return "<a target=\"blank\" href=\"/search?search=" + encodeURI(_2.replaceAll("<b>", "").replaceAll("</b>", "")) + "\">" + _1 + "</a>";
			});
			new_text = new_text.replaceAll(/^<b>/gm, "<hr><b>");
			return new_text.replaceAll("\n", "<br>");
		}
