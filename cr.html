<html>

<head>
	<title>TITLE</title>
	<link rel="icon" type="image/x-icon" href="/img/favicon.png">
	<link rel="stylesheet" href="/src/css/mana.css">
	<link rel="stylesheet" href="/src/css/header.css">
	<link rel="stylesheet" href="/src/css/theme.css">
	<link rel="stylesheet" href="/src/css/modal.css">
	<link rel="stylesheet" href="/src/css/pages/cr.css">
</head>
<body>
	<img src="img/header/menu.png" class="header-control" onclick="toggleHeader()">
	<div class="header">
		<div class="search-grid">
			<a href="/"><img class="sg-logo" src="/img/banner.png"></a>
			<img class="sg-icon" src="/img/header/search.png">
			<div style="position: relative; width: 100%;">
				<input type="text" inputmode="search" placeholder="Search ..." name="search" id="search" spellcheck="false" autocomplete="off" autocorrect="off" spellcheck="false">
				<div id="tag-dropdown" style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #d5d9d9; z-index: 1000; max-height: 200px; overflow-y: auto; color: black; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"></div>
			</div>
			<a href="/all-sets"><img src="/img/header/sets.png" class="sg-icon">Sets</a>
			<a href="/deckbuilder"><img src="/img/header/deck.png" class="sg-icon">Deckbuilder</a>
			<a onclick="randomCard()"><img src="/img/random.png" class="sg-icon">Random</a>
			<div class="community"><a href="/community"><img src="/img/header/community.png"
						class="sg-icon">Community<b>⮟</b></a>
				<div class="community-dropdown">
					<a href="/community?tab=users" class="community-dropdown-item"><img class="dropdown-icon"
							src="img/header/community.png">Users</a>
					<a href="/community?tab=decks" class="community-dropdown-item"><img class="dropdown-icon"
							src="img/header/deck.png">Decks</a>
					<a href="/community?tab=events" class="community-dropdown-item"><img class="dropdown-icon"
							src="img/swords.png">Events</a>
					<a href="/community?tab=cards" class="community-dropdown-item"><img class="dropdown-icon"
							src="img/header/sets.png">Cards</a>
				</div>
			</div>
			<a href="/settings" class="account-link"><img src="/img/header/settings.png" class="sg-icon"></a>
			<a href="/account" class="account-link"><img src="/img/header/account.png" class="sg-icon"></a>
			<div class="mobile-buttons">
				<a href="/search"><img src="/img/header/search.png" class="sg-icon"></a>
				<a href="/settings"><img src="/img/header/settings.png" class="sg-icon"></a>
				<a href="/account"><img src="/img/header/account.png" class="sg-icon"></a>
			</div>
		</div>
	</div>
	<div class="selects" id="selects">
		<select id="color-select" onchange="setGradient()">
		</select>
	</div>
	<div class="page-container">
        <div class="cr"></div>
	</div>
	<div id="modal-container">
		<div id="modal-content" class="popout">
			<span class="close"
				onclick="document.getElementById('modal-container').style.display = 'none';">&times;</span>
		</div>
	</div>
	<script src="/src/js/background.js"></script>
	<script>
        document.addEventListener("DOMContentLoaded", async function () {
			await fetch('/lists/all-cards.json')
				.then(response => response.json())
				.then(json => {
					card_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(json => {
					set_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/data/cr.txt')
				.then(response => response.text())
				.then(text => {
					cr = text;
				}).catch(error => console.error('Error:', error));

			card_list_arrayified = card_list.cards;

			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(data => {
					sets_json = data;
				}).catch(error => console.error('Error:', error));

			let all_tags = new Set();
			card_list_arrayified.forEach(card => {
				if (card.notes) {
					const tagMatches = card.notes.matchAll(/!tag(?:<\w+>)?\s+([^\s\n\b]+)/g);
					for (const match of tagMatches) {
						if (match[0].includes('!tag<')) continue;
						all_tags.add(match[1].replace(/;$/, ''));
					}
				}
			});

			const searchInput = document.getElementById("search");
			const tagDropdown = document.getElementById("tag-dropdown");

			// Create a mirror element for position calculation
			const mirror = document.createElement("div");
			Object.assign(mirror.style, {
				position: "absolute",
				visibility: "hidden",
				whiteSpace: "pre",
				font: getComputedStyle(searchInput).font,
				padding: "0", // No padding for pure text measurement
				border: "none",
				boxSizing: "content-box"
			});
			document.body.appendChild(mirror);

			if (searchInput && tagDropdown) {
				tagDropdown.style.width = "auto";
				tagDropdown.style.minWidth = "75px";
				tagDropdown.style.maxWidth = "300px";
				tagDropdown.style.maxHeight = "200px";
				tagDropdown.style.overflowY = "auto";

				const updateDropdown = function() {
					const value = searchInput.value;
					const cursorPosition = searchInput.selectionStart;
					
					// Find the tag: prefix immediately preceding the cursor
					const lastTagIndex = value.substring(0, cursorPosition).lastIndexOf("tag:");
					
					if (lastTagIndex !== -1) {
						const queryStart = lastTagIndex + 4;
						const query = value.substring(queryStart, cursorPosition);
						
						if (!query.includes(" ")) {
							const filteredTags = Array.from(all_tags).filter(tag => tag.toLowerCase().startsWith(query.toLowerCase())).sort();
							if (filteredTags.length > 0) {
								tagDropdown.innerHTML = "";
								filteredTags.forEach(tag => {
									const div = document.createElement("div");
									div.innerText = tag;
									div.style.padding = "5px 10px";
									div.style.cursor = "pointer";
									div.style.whiteSpace = "nowrap";
									div.onmouseover = () => div.style.background = "#f0f0f0";
									div.onmouseout = () => div.style.background = "white";
									div.onclick = () => {
										const newValue = value.substring(0, queryStart) + tag + " " + value.substring(cursorPosition);
										searchInput.value = newValue;
										tagDropdown.style.display = "none";
										searchInput.focus();
										const newCursorPos = queryStart + tag.length + 1;
										searchInput.setSelectionRange(newCursorPos, newCursorPos);
									};
									tagDropdown.appendChild(div);
								});

								// Calculate position
								mirror.textContent = value.substring(0, lastTagIndex + 4);
								const textWidth = mirror.getBoundingClientRect().width;
								const inputPaddingLeft = parseFloat(getComputedStyle(searchInput).paddingLeft) || 0;
								
								tagDropdown.style.left = Math.min(textWidth + inputPaddingLeft, searchInput.offsetWidth - tagDropdown.offsetWidth) + "px";
								tagDropdown.style.display = "block";
								return;
							}
						}
					}
					tagDropdown.style.display = "none";
				};

				searchInput.addEventListener("input", updateDropdown);
				searchInput.addEventListener("click", updateDropdown);
				searchInput.addEventListener("keyup", updateDropdown);

				document.addEventListener("click", function(e) {
					if (e.target !== searchInput && e.target !== tagDropdown) {
						tagDropdown.style.display = "none";
					}
				});
			}

            buildCr(cr);
		});


        function buildCr(_cr) {
            let [ contents, cr ] = _cr.split('Comprehensive Rules Start');
            contents = contents.replaceAll(/^(\*?)([\w\d\.]+[a-z\.]) /gm, (_, star, $1) => `${star}<a href='#${$1}'>${$1}</a> `);
            cr = cr.replaceAll(/^\*?\d+\. .*?$/gm, $1 => `<div class="cr-header">${$1}</div>`);
            cr = cr.replaceAll(/^\*?\d+\.\d+\. .*?$/gm, $1 => `<div class="indent-1">${$1}</div>`);
            cr = cr.replaceAll(/^\*?\d+\.\d+[a-z]+ .*?$/gm, $1 => `<div class="indent-2">${$1}</div>`);
            // cr = cr.replaceAll(/^\*?\d+\.\d+\.\d+[a-z]+ /gm, $1 => `<div class="indent-3">${$1}</div>`);
            cr = cr.replaceAll(/\>(\*?)([\w\d\.]+[a-z\.]) /gm, (_, $0, $1) => `>${$0}<a href='#${$1}' id='${$1}'>${$1}</a> `);
            cr = cr.replaceAll(/rule (.*?)([), ]|\.\s)/g, (_, $1, $2) => `rule <a href="#${$1}${$1.match(/[a-z]/) ? '' : '.'}">${$1}</a>${$2}`);
			cr = formatTextHTML(cr);
            cr = cr.replaceAll('\n', '<br>');
            contents = contents.replaceAll('\n', '<br>');
			document.querySelector('.cr').innerHTML = contents + '<br>' + cr;
		}

		function formatTextHTML(str) {
			if (!str)
				return "";
			str = str.replace(/[{]([^}]+)[}]/g, function (matched, _1) {
				let letters = _1.toLowerCase()
				return `<span class="mana mana-cost ${isText(letters)} mana-` + letters + '"></span>';
			})
			return str;
		}

		function isText(l) {
			if (l.includes("v") || l.includes("e")) {
				return "popout";
			}
			return "";
		}

		modal = document.getElementById("modal-container");
		window.onclick = function (event) {
			if (event.target == modal) {
				document.getElementById('modal-container').style.display = 'none';
			}
		}

		document.getElementById("search").addEventListener("keypress", function (event) {
			if (event.key === "Enter") {
				event.preventDefault();
				const url = new URL('search', window.location.origin);
				url.searchParams.append('search', document.getElementById("search").value);
				window.location.href = url;
			}
		});
		function randomCard() {
			let i = Math.floor(Math.random() * (card_list_arrayified.length + 1));
			let random_card = card_list_arrayified[i];

			const url = new URL('card', window.location.origin);
			const params = {
				set: random_card.set,
				num: random_card.number,
				name: random_card.card_name
			}
			for (const key in params) {
				url.searchParams.append(key, params[key]);
			}

			window.location.href = url;
		}
	</script>
</body>

</html>
