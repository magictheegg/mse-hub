	<script>
		let cleague_packs;
		let gradients = null;
		let raw_gradients = null;
		let gradTop = null;
		let gradBottom = null;
		let p1p1_cards;
		let pulls = []; // TODO: rework this to be an index into all_packs to save memory & time
		let all_packs = [];
		let firstpack = true;
		let doneFirstWindow = false;
		const card_list_cleaned = [];
		const urlParams = new URLSearchParams(window.location.search);
		let pack = urlParams.get('pack');
		const source = urlParams.get('source');
		let pack_count = 0;
		let num_packs = urlParams.get('num') ? parseInt(urlParams.get('num')) : 1 /* that should be enough for everyone */;
		const masterPack = [[], [], [], [], [], [], [], [], [], [], [], [], [], [], []];
		// document.getElementById("next-pack").dataset.count = pack_count;
		// document.getElementById("next-pack").dataset.packs = num_packs;
		modal = document.getElementById("modal-container");
		window.onclick = function (event) {
			if (event.target == modal && (!window.location.search.includes('?collectionleague') || doneFirstWindow)) {
				document.getElementById('modal-container').style.display = 'none';
			}
		}

		function isSanctum(card) {
			const regex = new RegExp("((P|p)athbound|(H|h)eir–)");
			if (regex.test(card.rules_text.toLowerCase())) {
				return true;
			} else {
				if (card.type.match(/wonder/i) || card.type.match(/erysite/i) || card.type.match(/realm/i) || card.type.match(/frontier/i)) {
					return true;
				} else {
					if (card.special_text.includes("sanctum")) {
						return true;
					} else {
						return false;
					}
				}
			}
		}

		document.addEventListener("DOMContentLoaded", async function () {
			await fetch('/lists/all-cards.json')
				.then(response => response.json())
				.then(json => {
					card_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/resources/replacechars.txt')
				.then(response => response.text())
				.then(text => {
					specialchars = text;
				}).catch(error => console.error('Error:', error));

			card_list_arrayified = card_list.cards;

			const isCollLeague = window.location.search.includes('?collectionleague');
			if (isCollLeague) {
				await fetch(`https://voyager-api-pq2h.onrender.com/collectionleague/packs/available?session=${localStorage.getItem('settings.session')}`)
					.then(response => response.json())
					.then(json => {
						cleague_packs = json;
					}).catch(error => console.error('Error:', error));

				num_packs = cleague_packs.length;
				pack = 'Collection League';
			}

			document.title = `${num_packs} ${pack} packs`;

			const seen_cards = [];

			for (const card of card_list_arrayified) {
				if (seen_cards.includes(card.card_name)) continue;
				if (card.shape.includes('token')) continue;
				if (card.card_name === "Kera, New Mordel's Hope" || card.card_name === "Guardian of the Cinders") continue;

					
				card_list_cleaned.push(card);
				seen_cards.push(card);
			}

			/*
			1 r/m
			2 >=w c/u
			2 >=u c/u
			2 >=b c/u
			2 >=r c/u
			2 >=g c/u
			2 >=i c/u
			1 sanctum
			1 land
			*/

			for (const card of card_list_cleaned) {
				if (card.rarity === 'rare' || card.rarity === 'mythic') { 
					masterPack[0].push(card);
				}
				if (card.rarity === 'uncommon' || card.rarity === 'common') {
					if (card.color.includes("W")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[1].push(card);
							masterPack[2].push(card);
						}
					}

					if (card.color.includes("U")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[3].push(card);
							masterPack[4].push(card);
						}
					}

					if (card.color.includes("B")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[5].push(card);
							masterPack[6].push(card);
						}
					}

					if (card.color.includes("R")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[7].push(card);
							masterPack[8].push(card);
						}
					}

					if (card.color.includes("G")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[9].push(card);
							masterPack[10].push(card);
						}
					}

					if (card.color.includes("I")) { 
						for (let i = 0; i < 5; i++) {
							masterPack[11].push(card);
							masterPack[12].push(card);
						}
					}

					if (card.card_color === '') {
						for (let i = 1; i <= 12; i++)
							masterPack[i].push(card);
					}
				}
				if (isSanctum(card)) masterPack[13].push(card);
				if (card.type.includes("Land") && !card.type.includes('Basic'))
					masterPack[14].push(card); 
			}

			if (isCollLeague) {
				openPackSelect();
				return;
			}
			await getPack(pack);
			nextPack();
			updatePackCount();
		});

		async function openPackSelect() {
			const modal_content = document.getElementById("modal-content");
			modal_content.style.width = "90%";
			modal_content.innerHTML = "<h1>Unopened Packs</h1>";
			document.getElementById("modal-container").style.display = "block";
			
			cleague_packs_reduced = cleague_packs.reduce((acc, curr) => {
				acc[curr] = (acc[curr] || 0) + 1;
				return acc;
			}, {});

			const container = document.createElement('div');
			container.className = 'packs-container';
			
			for (const [pack, num] of Object.entries(cleague_packs_reduced)) {
				const pack_container = document.createElement('div');
				pack_container.dataset.pack = pack;
				pack_container.dataset.num = num;
				pack_container.className = `pack-container pack-${pack}`;

				const label = document.createElement('span');
				label.className = 'code-label';
				label.innerText = `Open ${pack} packs:`;

				const booster = document.createElement('img');
				booster.src = `/data/collectionleague/packs/${pack}.png`;
				booster.className = 'booster';

				const num_packs = document.createElement('div');
				num_packs.className = 'packs-select';

				const packs_input = document.createElement('input');
				packs_input.className = 'num-packs';
				packs_input.type = 'number';
				packs_input.value = 0;
				packs_input.onchange = () => {
					packs_input.value = Math.min(Math.max(packs_input.value, 0), num);
				}

				const total_packs = document.createElement('span');
				total_packs.className = 'total-packs';
				total_packs.innerText = `/${num}`;

				num_packs.appendChild(packs_input);
				num_packs.appendChild(total_packs);
				pack_container.appendChild(booster);
				pack_container.appendChild(label);
				pack_container.appendChild(num_packs);
				container.appendChild(pack_container);
			}

			modal_content.appendChild(container);

			if (cleague_packs.length == 0) {
				const no_packs_text = document.createElement('div');
				no_packs_text.className = 'no-packs-text';
				no_packs_text.innerText = 'You have no packs to open currently. To obtain more, play games of any Voyager format.';
				modal_content.appendChild(no_packs_text);
			}

			const buttonContainer = document.createElement('div');
			buttonContainer.className = 'open-button-container';

			const open = document.createElement('button');
			open.className = 'open-button';
			open.innerText = 'Open Selected Packs';

			const openAll = document.createElement('button');
			openAll.className = 'open-button';
			openAll.innerText = 'Open All';

			open.onclick = async () => {
				let cleague_packs = [];
				let message = 'Continue to open the following packs?\n';
				for (const pack of document.querySelectorAll('.pack-container')) {
					const title = pack.dataset.pack;
					const num = pack.querySelector('input').value;
					message += `${num} ${title} packs\n`;
					for (let i = 0; i < num; i++)
						cleague_packs.push(title);
				}
				if (!window.confirm(message)) return;

				num_packs = cleague_packs.length;
				pack_count = 0;
				await generateAllPacks();
				document.querySelector('#modal-container').style.display = 'none';
				nextPack();
				await fetch(`https://voyager-api-pq2h.onrender.com/collectionleague/packs/open?session=${localStorage.getItem('settings.session')}&packs=${encodeURI(cleague_packs.join(','))}`)
				doneFirstWindow = true;
			};

			openAll.onclick = async () => {
				let cleague_packs = [];
				let message = 'Continue to open the following packs?\n';
				for (const pack of document.querySelectorAll('.pack-container')) {
					const title = pack.dataset.pack;
					const num = pack.dataset.num;
					message += `${num} ${title} packs\n`;
					for (let i = 0; i < num; i++)
						cleague_packs.push(title);
				}
				if (!window.confirm(message)) return;

				num_packs = cleague_packs.length;
				pack_count = 0;
				await generateAllPacks();
				document.querySelector('#modal-container').style.display = 'none';
				nextPack();
				await fetch(`https://voyager-api-pq2h.onrender.com/collectionleague/packs/open?session=${localStorage.getItem('settings.session')}&packs=${encodeURI(cleague_packs.join(','))}`)
				doneFirstWindow = true;
			}

			buttonContainer.appendChild(open);
			buttonContainer.appendChild(openAll);
			modal_content.appendChild(buttonContainer);
		}

		async function getPack(pack) {
			if (pack === 'MASTER') {
				p1p1_cards = masterPack.slice();
				return;
			}
			const draft_file = await getDraftFile(pack);
			draftmancerToP1P1(draft_file, pack);
		}

		async function getDraftFile(pack) {
			let file;
			await fetch('/sets/' + pack + '-files/' + pack + '-draft.txt')
				.then(response => response.text())
				.then(text => {
					file = text;
				}).catch(error => console.error('Error:', error));

			return file;
		}

		function draftmancerToP1P1(draft_file, default_set) { // comments in here by aanginer
			updatePackCount(); // just do this at the start
			let draft_slots = {};
			let p1p1_object = [];
			let result_json = [];
			let card_map = {};
			let current_slot_index = 0;
			let slot_indexes = {};
			const draft_headers = draft_file.matchAll(/\[(.+?)\([0-9]+?\)]/g); // match text between [ and ]
			for (const result of draft_headers) {
				const copies = parseInt(result[0].match(/\((.*?)\)/g)[0].split("(")[1].split(")")[0]); // match text between ( and ) -- do the split thing bc js regex doesnt let me grab the group for some reason????????
				// -- this is useless but if needed, const name = result.groups[0].match(/\[(.*)\(/g); // match text before (
				draft_slots[result[0]] = copies;
				slot_indexes[result[0]] = current_slot_index;
				current_slot_index += copies;
			}

			for (let i = 0; i < current_slot_index; i++) { // the current index should be the total number
				p1p1_object.push([]);
			}

			draft_slots["EOF"] = 0; // add this so when we check for the next slot in the final one we don't get an index error
			for (let i = 0; i < Object.keys(draft_slots).length - 1; i++) {
				const draft_slot = Object.keys(draft_slots)[i];
				const next_slot = Object.keys(draft_slots)[i + 1];
				const slot_size = draft_slots[draft_slot];

				let card_lines = draft_file.split(draft_slot)[1].split(next_slot)[0].split("\n"); // split between the 2 slots -- splitting by EOF shouldnt be a problem as thatll yield a 1 element list
				for (const line of card_lines) {
					const count = parseInt(line.substring(0, line.indexOf(' ')));
					const card_name = line.substring(line.indexOf(' ') + 1).trim();

					if (!card_map[card_name]) {
						card_map[card_name] = {};
					}

					card_map[card_name][draft_slot] = card_map[card_name][draft_slot] ? card_map[card_name][draft_slot] + count : count; // fancy way to do a null check to decide between = and +=
				}
			}

			const card_list_cleaned = [];
			const seen_cards = [];

			for (const card of card_list_arrayified) {
				if (default_set && card.set !== default_set) continue;
				if (seen_cards.includes(card.card_name)) continue;
				if (card.shape.includes('token')) continue;
				if (card.card_name === "Kera, New Mordel's Hope" || card.card_name === "Guardian of the Cinders") continue;

					
				card_list_cleaned.push(card);
				seen_cards.push(card);
			}

			for (const card of card_list_cleaned) { // grab the needed card data
				if (!Object.keys(card_map).includes(card.card_name)) continue; 
				const card_slots = card_map[card.card_name];
				for (const slot in card_slots) {
					const slot_copies = draft_slots[slot];
					for (let i = 0; i < slot_copies; i++) {
						for (let j = 0; j < card_slots[slot]; j++)
							p1p1_object[slot_indexes[slot] + i].push(card);
					}
				}		
			}

			p1p1_cards = p1p1_object;
		}

		async function nextPack() {
			const current_pack = all_packs.length != 0 ? all_packs[pack_count] : generatePack();

			if (pack_count < num_packs && (num_packs != 1 || firstpack)) {
				pulls.push(...current_pack);
				pack_count++;
			} else {
				document.getElementById("pack").innerHTML = "";
				endScreen(pulls);
				return;
			}

			if (pack_count <= num_packs) {
				showPack(current_pack);
			}

			if (pack_count <= num_packs) updatePackCount();

			if (pack_count >= num_packs) {
				document.getElementById("next-pack").innerText = "View Pulls";
			}

			buildPulls();
			firstpack = false
		}

		async function endScreen(opened) {
			document.getElementById("pulls").style.display = 'block';
			document.getElementById("pulls").innerHTML = `
				<div class="summary-center">
					<div class="deck-view"></div>
					<div class="card-preview-container">
						<img class="card-preview">
						<button class="open-button" onclick="window.location.reload()">Continue</button>
					</div>
				</div>`;

			opened.sort((a, b) => {
				if (a.type.includes('Basic') && !b.type.includes('Basic')) return 1;
				if (!a.type.includes('Basic') && b.type.includes('Basic')) return -1;
				const rarity_sort_order = ["mythic", "rare", "uncommon", "common"];
				let a_rarity_index = 100;
				let b_rarity_index = 100;

				for (const [i, rarity] of rarity_sort_order.entries()) {
					if (a.rarity.toLowerCase() == rarity)
						a_rarity_index = i;
					if (b.rarity.toLowerCase() == rarity)
						b_rarity_index = i;	
				}

				return a_rarity_index - b_rarity_index;
			});

			const deck_container = document.querySelector('.deck-view');
			for (const card of opened) {
				const container = buildImgContainer(card);
				const link = container.querySelector('a');
				link.removeAttribute('href');
				link.style.cursor = 'pointer';
				link.onclick = () => {
					document.querySelector('.card-preview').src = link.querySelector('img').src;
				}
				deck_container.appendChild(container);
			}
		}

		function updatePackCount() {
			document.getElementById("pack-counter").innerText = `Pack ${pack_count}/${num_packs}`;
		}

		async function generateAllPacks() {
			let packs;
			let prev;
			all_packs = [];
			if (window.location.search.includes('?collectionleague')) packs = cleague_packs;
			else packs = Array(num_packs).fill(pack);

			for (const pack_to_open of packs) {
				if (pack_to_open != prev) await getPack(pack_to_open);
				const generated = generatePack();
				all_packs.push(generated);
				await fetch(`https://voyager-api-pq2h.onrender.com/collectionleague/collection/edit?session=${localStorage.getItem('settings.session')}&group=1 ${pack_to_open}&collection=${packToText(generated)}`) 
				prev = pack_to_open;
			}				
		}

		function packToText(_pack) {
			let ret = '';
			for (const card of _pack) 
				ret += `1 ${card.card_name} (${card.set}) ${card.number}\n`;
			return btoa(ret);
		}

		function generatePack() {
			img_list = [];
			used_cards = [];
			for (const slot of p1p1_cards) {
				if (slot.length == 0)
					continue;

				do {
					rand_i = Math.floor(Math.random() * (slot.length));
					card = slot[rand_i];
				} while (used_cards.includes(card));

				const img_url = '/sets/' + card.set + '-files/img/' + card.number + '_' + card.card_name + (card.shape.includes('double') ? '_front' : '') + '.' + card.image_type;

				const image = new Image();
				image.src = img_url;

				img_list.push(image);
				used_cards.push(card);
			}
			return used_cards;
		}

		function showPack(_pack) {
			document.getElementById("pack").innerHTML = "";

			for (const card of _pack) {
				const card_ele = gridifyCard(card, false, false, false, false);
				card_ele.onclick = () => {
					openCardModal(card);
				}
				document.getElementById("pack").appendChild(card_ele);
			}

			const divider = document.createElement("div");
			divider.className = "divider text-bg";
			document.getElementById("pack").appendChild(divider);
		}

		function buildPulls() {
			let col_lengths = [0, 0, 0, 0, 0, 0, 0, 0];
			document.getElementById("pulls").innerHTML = '<div class="card-col" id="col-0"></div><div class="card-col" id="col-1"></div><div class="card-col" id="col-2"></div><div class="card-col" id="col-3"></div><div class="card-col" id="col-4"></div><div class="card-col" id="col-5"></div><div class="card-col" id="col-6"></div>';

			for (const card of pulls) {
				const card_ele = gridifyCard(card, false, false, false, false);
				card_ele.onclick = function () {
					openCardModal(card);
				}
				// card_ele.firstChild.style.height = "10px";
				// card_ele.height = "40px";
				const mv = Math.min(6, convertToMV(card.cost));
				col_lengths[mv] += 1;
				document.getElementById(`col-${mv}`).appendChild(card_ele);
			}

			for (let i = 0; i < 7; i++) {

		const default_colls = ["Sanctum cards", "Pauper", "Full card pool"];

		function savePulls() {
			document.getElementById("modal-content").innerHTML = `<span class="close" onclick="document.getElementById('modal-container').style.display = 'none';">&times;</span>`;
			const colls = JSON.parse(localStorage.getItem("colls.collections"));
			const collection_dropdown = document.createElement("select");
			collection_dropdown.className = "coll-dropdown popout";
			collection_dropdown.id = "coll-dropdown";

			for (const coll in colls) {
				if (default_colls.includes(coll))
					continue;
				const coll_ele = document.createElement("option");
				coll_ele.value = coll;
				coll_ele.innerText = coll;
				collection_dropdown.appendChild(coll_ele);
			}

			const coll_name = document.createElement("input");
			coll_name.className = "input coll-name popout";
			coll_name.id = "coll-name";
			coll_name.placeholder = "Collection name..."

			const coll_ele = document.createElement("option");
			coll_ele.value = "new";
			coll_ele.innerText = "New Collection +";
			collection_dropdown.appendChild(coll_ele);

			if (collection_dropdown.value == "new") {
				coll_name.style.display = "block";
			} else {
				coll_name.style.display = "none";
			}

			collection_dropdown.onchange = function () {
				if (collection_dropdown.value == "new") {
					coll_name.style.display = "block";
				} else {
					coll_name.style.display = "none";
				}
			}

			const save_btn = document.createElement("button");
			save_btn.className = "save-btn dark-button";
			save_btn.innerText = "Save to collection";

			save_btn.onclick = function () {
				let coll_cards = {};
				let updated_collection = [];
				for (const card of pulls) {
					coll_cards[card.card_name] = !coll_cards[card.card_name] ? 1 : coll_cards[card.card_name] + 1;
				}

				for (const card in coll_cards) {
					updated_collection.push(`${coll_cards[card]} ${card}`);
				}

				const collection_to_save = collection_dropdown.value == "new" ? coll_name.value : collection_dropdown.value;
				const save_val = collection_dropdown.value == "new" ? updated_collection : [...colls[collection_to_save], ...updated_collection];
				colls[collection_to_save] = save_val;
				localStorage.setItem("colls.collections", JSON.stringify(colls));

				document.getElementById("modal-container").style.display = "none";
			}

			const content_container = document.createElement("div");
			content_container.className = "save-coll-modal-container";

			content_container.appendChild(collection_dropdown);
			content_container.appendChild(coll_name);
			content_container.appendChild(save_btn);
			document.getElementById("modal-content").appendChild(content_container);
			document.getElementById("modal-container").style.display = 'block';
		}

		document.getElementById("import-file").addEventListener("change", function (event) {
			const files = event.target.files;

			if (files.length > 0) {
				const file = files[0];
				const name = file.name.replace(/\.[^/.]+$/, "");
				const reader = new FileReader();
				reader.onload = async function (e) {
					const fileContent = e.target.result;
					pack_count = 0;
					pulls = [];
					buildPulls();
					updatePackCount();
					draftmancerToP1P1(fileContent);
					await generateAllPacks();
					nextPack();
				}

				reader.readAsText(file);
			}
		});

		function isDecimal(char) {
			return char >= '0' && char <= '9';
		}

		function convertToMV(cost) {
			let mv = 0;

			costTokens = cost.substring(1, cost.length - 1).replaceAll("}{", " ").split(' ');
			for (const token of costTokens) {
				if (isDecimal(token)) {
					mv += parseInt(token);
				}
				// 2brid
				else if (token.includes('2')) {
					mv += 2;
				}
				else if (token != "x" && token != "") {
					mv += 1;
				}
			}

			return mv;
		}

				url.searchParams.append('search', document.getElementById("search").value);
				window.location.href = url;
			}
		});
		function randomCard() {
			let i = Math.floor(Math.random() * (card_list_arrayified.length + 1));
			let random_card = card_list_arrayified[i];

			const url = new URL('card', window.location.origin);
			const params = {
				set: random_card.set,
				num: random_card.number,
				name: random_card.card_name
			}
			for (const key in params) {
				url.searchParams.append(key, params[key]);
			}

			window.location.href = url;
		}
