<style>
	body {

		background-color: #bbbbbb;

	.search-grid {

	}

	.sg-icon {

	}





	.login-container {

	.buttons-container {
		display: grid;

		align-items: center;
		grid-template-columns: 1fr 1fr;
		width: 45vw;
	}

	.submit {
		display: block;

		border-radius: 10px;
		background-color: #29b5e8;
		display: flex;
		align-items: center;
		gap: 8px;
		justify-content: center;
		color: white;
		font-weight: bold;
		font-size: 30px;
		text-align: center;
		margin: 3px;
		width: 90%;
		cursor: pointer;
		border: #333355 solid 2px;
	}

	.discord {
		background-color: #5a69dd;
		width: 97%;
		display: inline-flex;
	}

	.btn-icon {
		height: 40px;
	}

	.login-container a {
		outline: none;
		text-decoration: none;
		width: 100%;
		grid-column: span 2;
	}

	@media (max-device-width: 750px) {
		input, .buttons-container {

		}

</style>

			appId: "1:411191248476:web:591349be169d823e5f8899",
			measurementId: "G-TQ1L48F25M"
		};

		async function sha256(message) {
			// encode as UTF-8
			const msgBuffer = new TextEncoder().encode(message);

			// hash the message
			const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);

			// convert ArrayBuffer to Array
			const hashArray = Array.from(new Uint8Array(hashBuffer));

			// convert bytes to hex string                  
			const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
			return hashHex;
		}

		function generateSalt() {
			let ret = "";

			const chars = "QWERTYUIOPASDFGHJKLZXCVBNMqwertyuiopasdfghjklzxcvbnm1234567890-=[]:;'<>/?_+={}|"

			for (let i = 0; i < 10; i++) {
				ret += chars[Math.floor(Math.random() * chars.length)]
			}

			return ret;
		}

		// Initialize Firebase
		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		document.getElementById("log-in").addEventListener("click", async (e) => {
			let name = document.getElementById("username").value;
			let pw = btoa(document.getElementById("password").value);
			let exit = false;

			const data = await getDoc(doc(db, "users", name)).then(async docSnap => {
				let data = docSnap.data();

				if (!data.salt) {
					data.salt = generateSalt();
					data.password = await sha256(data.password + data.salt + data.username);
					await updateDoc(doc(db, "users", name), {
						salt: data.salt,
						password: data.password
					});
				}

				let current_password_hashed = await sha256(pw + data.salt + data.username);

				if (current_password_hashed != data.password) {
					alert("Incorrect Password!");
					exit = true;
					return;
				}
			});

			if (exit) {
				return;
			}

			const uuid = "10000000-1000-4000-8000-100000000000".replace(/[018]/g, c => (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16));

			await setDoc(doc(db, "sessions", uuid), {
				username: name
			});

			alert("Logged in as " + name);
			// localStorage.setItem("settings.account", name);
			localStorage.setItem("settings.session", uuid);
			window.location.href = "/account";
		});

		document.getElementById("sign-up").addEventListener("click", async (e) => {
			let name = document.getElementById("username").value;
			let pw = btoa(document.getElementById("password").value);
			let exit = false;

			if (name == 'info') {
				alert("Username taken!");
				return;
			}

			const q = query(collection(db, "users"), where("username", "==", name));
			const querySnapshot = await getDocs(q).then(docSnap => {
				let users = [];
				docSnap.forEach((doc) => {
					users.push({ ...doc.data(), id: doc.id });
				});
				if (users.length != 0) {
					alert("Username taken!");
					exit = true;
					return;
				}
			});

			if (exit) {
				return;
			}

			const salt = generateSalt();

			await setDoc(doc(db, "users", name), {
				username: name,
				password: await sha256(password + salt + name),
				decks: [],
				salt: salt
			});

			const uuid = "10000000-1000-4000-8000-100000000000".replace(/[018]/g, c => (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16));

			await setDoc(doc(db, "sessions", uuid), {
				username: name
			});

			// localStorage.setItem("settings.account", name);
			// console.log(window.location.href.split("/l")[0]);
			localStorage.setItem("settings.session", uuid);
			alert("Signed up as " + name);
			window.location.href = window.location.href.split("/l")[0];

		});
	</script>
