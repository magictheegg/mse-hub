	<script>
		let gradients = null;
		let raw_gradients = null;
		let gradTop = null;
		let gradBottom = null;
		modal = document.getElementById("modal-container");
		window.onclick = function (event) {
			if (event.target == modal) {
				document.getElementById('modal-container').style.display = 'none';
			}
		}

		document.getElementById("search").addEventListener("keypress", function (event) {
			if (event.key === "Enter") {
				event.preventDefault();
				const url = new URL('search', window.location.origin);
				url.searchParams.append('search', document.getElementById("search").value);
				window.location.href = url;
			}
		});
	</script>
	<script type="module">
		// Import the functions you need from the SDKs you need
		import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
		import { setDoc, addDoc, updateDoc, doc, collection, getFirestore, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
		// TODO: Add SDKs for Firebase products that you want to use
		// https://firebase.google.com/docs/web/setup#available-libraries

		// Your web app's Firebase configuration
		// For Firebase JS SDK v7.20.0 and later, measurementId is optional
		const firebaseConfig = {
			apiKey: "AIzaSyCPurnKVn2caCn3L-gKF2tMFwWur73YAuw",
			authDomain: "voyager-78e30.firebaseapp.com",
			projectId: "voyager-78e30",
			storageBucket: "voyager-78e30.firebasestorage.app",
			messagingSenderId: "411191248476",
			appId: "1:411191248476:web:591349be169d823e5f8899",
			measurementId: "G-TQ1L48F25M"
		};

		const color_bgs = {
			white: "#"
		}

		// Initialize Firebase
		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		const urlParams = new URLSearchParams(window.location.search);
		if (urlParams.get("setsession")) { 
			localStorage.setItem('settings.session', urlParams.get("setsession"));
			history.pushState({}, document.title, "account");
		}
		

		let username = "";
		let password = "";
		let sessionid = localStorage.getItem('settings.session');
		let decks = {};
		let card_list_arrayified;
		let card_list;
		let events = ["League"];

		await getDoc(doc(db, "info", "events")).then(docSnap => {
			events.push(docSnap.data().recent);
		});

		if (!sessionid) {
			window.location.href = "/login";
		}
		if (localStorage.getItem("settings.compactaccount") == "On") {
			window.location.href = "/account-compact";
		}

		const resp = await getDoc(doc(db, 'sessions', sessionid)).then(docSnap => {
			let data = docSnap.data();

			if (!data) {
				window.location.href = "/login";
			}

			username = data.username;
			password = data.password;
		});

		await getDoc(doc(db, 'users', username)).then(docSnap => {
			let data = docSnap.data();
			decks = data.decks;
		});

		document.getElementById("username").innerText = username;
		// document.getElementById('text-style').innerHTML = `.text { color: ${localStorage.getItem('settings.textcolor')} }`;
		// document.getElementById('text-style').innerHTML += `\n.text-bg { background-color: ${localStorage.getItem('settings.textcolor')} }`;


		// if (localStorage.getItem("settings.darkthememenu") == "On") {
		// 	document.body.style.setProperty("--bg-color", "#171717");
		// 	document.body.style.setProperty("--popout-text-color", "white");
		// } else if (localStorage.getItem("settings.darkthememenu") == "Off") {
		// 	document.body.style.setProperty("--bg-color", "#f3f3f3");
		// 	document.body.style.setProperty("--popout-text-color", "black");
		// }


		document.body.style.setProperty("--text-color", localStorage.getItem("settings.textcolor"));

		// document.addEventListener("DOMContentLoaded", async () => {
		//     await fetch('/lists/all-cards.json')
		// 		.then(response => response.json())
		// 		.then(json => {
		// 			card_list_arrayified = json.cards;
		// 	}).catch(error => console.error('Error:', error));
		// });

		async function reload() {
			let card_list;
			let card_list_arrayified;
			if (!card_list_arrayified) {
				await fetch('/lists/all-cards.json')
					.then(response => response.json())
					.then(json => {
						card_list = json;
					}).catch(error => console.error('Error:', error));
			}

			card_list_arrayified = card_list.cards;
			
			await getDoc(doc(db, "info", "accountlinks")).then(docSnap => {
				const data = docSnap.data();

				let found = false;
				for (const user in data) {
					if (data[user] == username) found = true;
				}

				if (!found) document.getElementById("discord-link").style.display = "flex";
			});

			await getDoc(doc(db, 'users', username)).then(async docSnap => {
				const user_data = docSnap.data();
				let colls;
				let used_formats = [];
				document.title = username;
				let decks = user_data.decks;

				if (user_data.colls) {
					colls = JSON.parse(user_data.colls);
				} else {
					colls = [];
				}

				document.getElementById('decks').innerHTML = "";

				for (const deck of decks) {

					if (!used_formats.includes(deck.format)) {
						used_formats.push(deck.format);
						const full_format_container = createFormatContainer(deck.format);
						document.getElementById('decks').appendChild(full_format_container);
					}

					document.getElementById(deck.format).appendChild(createDeckContainer(user_data, deck, card_list_arrayified));

				}

				if (!document.getElementById("Collection League")) {
					createFormatContainer("Collection League");
				}

				createCollectionLeaguePacks(user_data);

				for (const deck of colls) {
					let deck_container = document.createElement('div');
					deck_container.className = "deck-container";
					let card_stats;
					let deck_preview = document.createElement('img');

					for (const card of card_list_arrayified) {
						if (deck.previewimg == card.card_name) {
							card_stats = card;
							break;
						}
					}
					deck_preview.src = "/sets/" + card_stats.set + "-files/img/" + card_stats.number + (card_stats.shape.includes("token") ? "t_" : "_") + card_stats.card_name + ((card_stats.shape.includes("double")) ? "_front" : "") + "." + card_stats.image_type;
					deck_preview.className = "deck-preview-img";
					deck_preview.onclick = function () {
						window.location.href = deck.url;
					}
					deck_preview.style.cursor = "pointer";
					let deck_name = document.createElement('div');
					deck_name.className = "deck-name";
					deck_name.innerText = deck.name;

					let deck_btns = document.createElement('div');
					deck_btns.className = "coll-buttons";

					let deck_link = document.createElement('a');
					deck_link.href = deck.url;

					let deck_edit_icon = document.createElement('img');
					deck_edit_icon.src = "/img/create.png";
					deck_edit_icon.className = "deck-icon-green";
					deck_link.innerText = "Create Deck";
					deck_link.className = "deck-link-green deck-icon-shadow";
					deck_link.appendChild(deck_edit_icon);

					let deck_delete_icon = document.createElement('img');
					deck_delete_icon.src = "/img/trash.png";
					deck_delete_icon.className = "deck-icon-red deck-icon-shadow";

					deck_delete_icon.onclick = async function () {
						let new_decks = decks;
						// let index = 0;
						let user_deck = {};
						for (let i = 0; i < decks.length; i++) {
							user_deck = decks[i];
							if (user_deck["name"] == deck.name) {
								new_decks.splice(i, 1);
							}
							// index += 1;
						}
						await updateDocs(doc(db, "users", username), {
							decks: (new_decks)
						});
						alert("Deck Deleted!");
						reload();
					}

					deck_btns.appendChild(deck_link);
					// deck_btns.appendChild(deck_submit_text);
					deck_btns.appendChild(deck_delete_icon);
					deck_container.appendChild(deck_name);
					deck_container.appendChild(deck_preview);
					deck_container.appendChild(deck_btns);
					document.getElementById('colls').appendChild(deck_container);
				}
			});
		}

		function createFormatContainer(format_name) {
			const full_format_container = document.createElement("div");
			const format_container = document.createElement("div");

			format_container.className = "format-container";
			format_container.id = format_name;

			const format_header = document.createElement("div");
			format_header.innerText = format_name;
			format_header.className = "format-header text";

			let divider = document.createElement("hr");
			divider.className = "text-bg";

			full_format_container.appendChild(format_header);
			full_format_container.appendChild(divider);
			full_format_container.appendChild(format_container);

			return full_format_container;
		}

		function createDeckContainer(user_data, deck, card_list_arrayified) {
			let full_deck_container = document.createElement('div');
			full_deck_container.className = "full-deck-container";

			let deck_container = document.createElement('div');
			deck_container.className = "deck-container";

			let colors_container = document.createElement('div');
			colors_container.className = "colors-container";

			let card_stats;
			let deck_preview = document.createElement('img');

			for (const card of card_list_arrayified) {
				if (deck.previewimg == card.card_name) {
					card_stats = card;
					break;
				}
			}

			if (!card_stats) {
				deck_preview.src = "/img/card_back.png"
			} else {
				deck_preview.src = "/sets/" + card_stats.set + "-files/img/" + card_stats.number + (card_stats.shape.includes("token") ? "t_" : "_") + card_stats.card_name + ((card_stats.shape.includes("double")) ? "_front" : "") + "." + card_stats.image_type;
			}

			deck_preview.onclick = function () {
				window.location.href = deck.url;
			}

			deck_preview.style.cursor = "pointer";
			deck_preview.className = "deck-preview-img";

			const deck_name = document.createElement('div');
			deck_name.className = "deck-name";
			deck_name.innerText = deck.name;

			const deck_btns = document.createElement('div');
			deck_btns.className = "deck-buttons";

			const deck_link = document.createElement('a');
			deck_link.href = deck.url;
			const deck_edit_icon = createDeckIcon("header/deck", "green");

			deck_link.appendChild(deck_edit_icon);
			const deck_submit_text = createDeckIconText("export-white", "blue", "Submit!", "");
			deck_submit_text.style.cursor = "pointer";
			deck_submit_text.onclick = async function () {

				document.getElementById('modal-container').style.display = 'block';
				const modal_content = document.getElementById('modal-content');
				const content_container = document.createElement("div");
				content_container.className = "submit-modal";
				modal_content.innerHTML = `<span class="close" onclick="document.getElementById('modal-container').style.display = 'none';">&times;</span>`;

				for (const event of events) {
					const deck_submit_text = createDeckIconText("export-white", "blue", "Submit to " + event, "");

					deck_submit_text.onclick = function () {
						handleEventSubmission(event, deck);
					}

					content_container.appendChild(deck_submit_text);
				}
				modal_content.appendChild(content_container);
			}

			const deck_delete_icon = createDeckIcon("trash", "red");

			deck_delete_icon.onclick = async function () {
				const confirmed = confirm(`Are you sure you want to delete ${deck.name}?`);
				if (!confirmed) return;

				const new_decks = decks;
				// let index = 0;
				let user_deck = {};
				for (let i = 0; i < decks.length; i++) {
					user_deck = decks[i];
					if (user_deck["name"] == deck.name) {
						new_decks.splice(i, 1);
					}
					// index += 1;
				}
				await updateDoc(doc(db, "users", username), {
					decks: (new_decks)
				});
				localStorage.removeItem(deck.name);
				reload();
			}

			const colors = deck.colors ? deck.colors : "";

			for (const color of colors) {
				const color_ele = document.createElement('img');
				color_ele.src = `/img/mana/mana_${color}.png`; // fuck you git
				color_ele.className = "mana-img";
				colors_container.appendChild(color_ele);
			}

			deck_btns.appendChild(deck_link);
			// deck_btns.appendChild(deck_submit_text);
			deck_btns.appendChild(deck_delete_icon);
			deck_container.appendChild(deck_name);
			deck_container.appendChild(deck_btns);
			deck_container.appendChild(deck_preview);
			full_deck_container.appendChild(deck_container);
			full_deck_container.appendChild(colors_container);
			return (full_deck_container);
		}

		async function handleEventSubmission(event, deck) {
			await getDoc(doc(db, "events", event)).then(async docSnap2 => {
				let tourndata = docSnap2.data();
				if (tourndata.name.includes("League")) {
					let runs = JSON.parse(tourndata.runs);
					let user_runs = runs[username] ? runs[username] : [];
					user_runs.push({ deck: deck, matches: [] });
					runs[username] = user_runs;
					updateDoc(doc(db, "events", event), {
						runs: JSON.stringify(runs)
					});
					return;
				}
				let decks_ = tourndata.decks;
				if (event.toLowerCase().includes("league")) {
					decks_.push({ ...deck, user: username });
				} else {
					decks_[username] = deck;
				}
				updateDoc(doc(db, "events", event), {
					decks: (decks_)
				});
			});
			alert("Submitted deck " + deck.name + " to" + event + "!");
		}

		function createDeckIcon(img, color) {
			const deck_icon = document.createElement('img');
			deck_icon.src = `/img/${img}.png`;
			deck_icon.className = `deck-icon-${color} deck-icon-shadow`;

			return deck_icon;
		}

		function createDeckIconText(img, color, text, link) {
			let deck_icon_text = document.createElement("div");
			deck_icon_text.innerText = text;
			deck_icon_text.className = `deck-link${link} deck-icon-shadow`;

			let deck_icon = document.createElement('img');
			deck_icon.src = `/img/${img}.png`;
			deck_icon.className = `deck-icon-${color}`;

			deck_icon_text.appendChild(deck_icon);

			return deck_icon_text;
		}

		async function createCollectionLeaguePacks(user_data) {
			await getDoc(doc(db, "info", "collectionleague")).then(docSnap => {
				const cl_data = docSnap.data();
				const players = JSON.parse(cl_data.players);

				if (players.includes(user_data.username)) {
					const packn = user_data.coll_league;

					const content_container = document.createElement("div");
					content_container.className = "coll-league-notif-container";
					content_container.style.gridRow = "1";
					content_container.style.gridColumn = "span 4";

					const collection_league_notif = document.createElement("span");
					collection_league_notif.innerText = `You have ${packn[0]} set packs available and ${packn[1]} collection league packs to open!`;
					collection_league_notif.className = "collection-league-notif text";

					const open_set_packs_btn = document.createElement("button");
					open_set_packs_btn.className = "coll-league-btn popout";
					open_set_packs_btn.innerText = "Open set packs!";
					open_set_packs_btn.onclick = () => {
						window.location.href = "/packopener?source=coll-league-set"
					}

					const open_pack_packs_btn = document.createElement("button");
					open_pack_packs_btn.className = "coll-league-btn popout";
					open_pack_packs_btn.innerText = "Open collection league packs!";
					open_pack_packs_btn.onclick = () => {
						window.location.href = "/packopener?source=coll-league-pack"
					}

					content_container.appendChild(collection_league_notif);
					content_container.appendChild(open_set_packs_btn);
					content_container.appendChild(open_pack_packs_btn);

					document.getElementById("Collection League").appendChild(content_container);
				}
			});
		}

		reload();
	</script>
