	<script>
		const delay = ms => new Promise(res => setTimeout(res, ms));
		
		document.addEventListener("DOMContentLoaded", async function () {
			await fetch('/lists/all-cards.json')
				.then(response => response.json())
				.then(json => {
					card_list = json;
				}).catch(error => console.error('Error:', error));

			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(json => {
					set_list = json;
				}).catch(error => console.error('Error:', error));

			card_list_arrayified = card_list.cards;

			await fetch('/lists/all-sets.json')
				.then(response => response.json())
				.then(data => {
					sets_json = data;
				}).catch(error => console.error('Error:', error));

			let all_tags = new Set();
			card_list_arrayified.forEach(card => {
				if (card.notes) {
					const tagMatches = card.notes.matchAll(/!tag(?:<\w+>)?\s+([^\s\n\b]+)/g);
					for (const match of tagMatches) {
						if (match[0].includes('!tag<')) continue;
						all_tags.add(match[1].replace(/;$/, ''));
					}
				}
			});

			const searchInput = document.getElementById("search");
			const tagDropdown = document.getElementById("tag-dropdown");

			// Create a mirror element for position calculation
			const mirror = document.createElement("div");
			Object.assign(mirror.style, {
				position: "absolute",
				visibility: "hidden",
				whiteSpace: "pre",
				font: getComputedStyle(searchInput).font,
				padding: "0", // No padding for pure text measurement
				border: "none",
				boxSizing: "content-box"
			});
			document.body.appendChild(mirror);

			if (searchInput && tagDropdown) {
				tagDropdown.style.width = "auto";
				tagDropdown.style.minWidth = "75px";
				tagDropdown.style.maxWidth = "300px";
				tagDropdown.style.maxHeight = "200px";
				tagDropdown.style.overflowY = "auto";

				const updateDropdown = function() {
					const value = searchInput.value;
					const cursorPosition = searchInput.selectionStart;
					
					// Find the tag: prefix immediately preceding the cursor
					const lastTagIndex = value.substring(0, cursorPosition).lastIndexOf("tag:");
					
					if (lastTagIndex !== -1) {
						const queryStart = lastTagIndex + 4;
						const query = value.substring(queryStart, cursorPosition);
						
						if (!query.includes(" ")) {
							const filteredTags = Array.from(all_tags).filter(tag => tag.toLowerCase().startsWith(query.toLowerCase())).sort();
							if (filteredTags.length > 0) {
								tagDropdown.innerHTML = "";
								filteredTags.forEach(tag => {
									const div = document.createElement("div");
									div.innerText = tag;
									div.style.padding = "5px 10px";
									div.style.cursor = "pointer";
									div.style.whiteSpace = "nowrap";
									div.onmouseover = () => div.style.background = "#f0f0f0";
									div.onmouseout = () => div.style.background = "white";
									div.onclick = () => {
										const newValue = value.substring(0, queryStart) + tag + " " + value.substring(cursorPosition);
										searchInput.value = newValue;
										tagDropdown.style.display = "none";
										searchInput.focus();
										const newCursorPos = queryStart + tag.length + 1;
										searchInput.setSelectionRange(newCursorPos, newCursorPos);
									};
									tagDropdown.appendChild(div);
								});

								// Calculate position
								mirror.textContent = value.substring(0, lastTagIndex + 4);
								const textWidth = mirror.getBoundingClientRect().width;
								const inputPaddingLeft = parseFloat(getComputedStyle(searchInput).paddingLeft) || 0;
								
								tagDropdown.style.left = Math.min(textWidth + inputPaddingLeft, searchInput.offsetWidth - tagDropdown.offsetWidth) + "px";
								tagDropdown.style.display = "block";
								return;
							}
						}
					}
					tagDropdown.style.display = "none";
				};

				searchInput.addEventListener("input", updateDropdown);
				searchInput.addEventListener("click", updateDropdown);
				searchInput.addEventListener("keyup", updateDropdown);

				document.addEventListener("click", function(e) {
					if (e.target !== searchInput && e.target !== tagDropdown) {
						tagDropdown.style.display = "none";
					}
				});

				while (!window.inCollectionLeague) await delay(100);

				if (!(await inCollectionLeague())) {
					document.querySelector('#modal-container').style.display = 'block';
					document.querySelector('#modal-content').innerHTML = `<div class="new-to-cl"><h1 class="not-joined">You're not in Collection League.</h1><p>To start, you'll get to open some packs!</p><button class="go" onclick="jumpStart()">Continue</button></div>`;			
				}
			}
		});

		async function jumpStart() {
			await fetch('/data/collectionleague/jumpstart.json')
				.then(response => response.json())
				.then(json => {
					jumpstart_data = json;
				}).catch(error => console.error('Error:', error));

			const items = new Set();
			while (items.size < 3)
				items.add(Math.floor(Math.random() * jumpstart_data.length));
			
			const options = jumpstart_data.filter((v, i) => items.has(i));
			document.querySelector('#modal-content').innerHTML = `
			<div class="jumpstart-summary">
				<h1 id="picked-packs"></h1>
				<div class="summary-center">
					<div class="deck-view"></div>
					<div class="card-preview-container">
						<img class="card-preview">
						<button class="go" onclick="openMaster()">Continue</button>
					</div>
				</div>
			</div>
			<div class="jumpstart-selection">
				<div class="jumpstart-container" id="jmp1"></div>
				<div class="jumpstart-container" id="jmp2"></div>
			</div>`;
			let jmp_container = document.querySelector('#jmp1');

			for (const pack of options) {
				const container = document.createElement('div');
				container.className = 'jmp-container';

				const pack_img = document.createElement('img');
				pack_img.className = 'jmp-preview';
				pack_img.src = `/data/collectionleague/jmp/${pack.name}.png`;

				const face_card = document.createElement('img');
				face_card.className = 'jmp-face';
				for (const card of card_list_arrayified) {
					if (card.card_name == pack.face_card) { 
						face_card.src = "/sets/" + card.set + "-files/img/" + card.number + (card.shape.includes("token") ? "t_" : "_") + card.card_name + ((card.shape.includes("double")) ? "_front" : "") + "." + card.image_type;
						break;
					}
				}

				container.onclick = async () => {
					localStorage.setItem('jmp-1', JSON.stringify(pack));
					await secondJmp();
					document.querySelector('#jmp1').style.transform = 'translate(0, 50vw)';
					document.querySelector('#jmp2').style.transform = 'translate(0, -62vw)';
				}

				container.appendChild(pack_img);
				container.appendChild(face_card);
				jmp_container.appendChild(container);
			}
		}

		async function secondJmp() {
			const pack_1 = JSON.parse(localStorage.getItem('jmp-1'));
			const jmp_data_filtered = jumpstart_data.filter(pack => pack.color != pack_1.color);
			console.log(jmp_data_filtered, pack_1.color);
			console.log(pack_1);

			const items = new Set();
			while (items.size < 3)
				items.add(Math.floor(Math.random() * jmp_data_filtered.length));

			jmp_container = document.querySelector('#jmp2');
			const options = jmp_data_filtered.filter((v, i) => items.has(i));

			for (const pack of options) {
				const container = document.createElement('div');
				container.className = 'jmp-container';

				const pack_img = document.createElement('img');
				pack_img.className = 'jmp-preview';
				pack_img.src = `/data/collectionleague/jmp/${pack.name}.png`;

				const face_card = document.createElement('img');
				face_card.className = 'jmp-face';
				for (const card of card_list_arrayified) {
					if (card.card_name == pack.face_card) { 
						face_card.src = "/sets/" + card.set + "-files/img/" + card.number + (card.shape.includes("token") ? "t_" : "_") + card.card_name + ((card.shape.includes("double")) ? "_front" : "") + "." + card.image_type;
						break;
					}
				}

				container.onclick = () => {
					document.querySelector('#jmp2').style.transform = 'translate(0, 50vw)';
					document.querySelector('.jumpstart-summary').style.display = 'block';
					localStorage.setItem('jmp-2', JSON.stringify(pack));
					const pack1 = JSON.parse(localStorage.getItem('jmp-1'));
					document.querySelector('#picked-packs').innerHTML = `You picked ${pack1.name} and ${pack.name}!`;

					const collection = new Map();
					for (const line of (pack1.list + pack.list).split('\n')) {
						const card_match = line.match(/(\d+) (.*?) \(([A-Z]+?)\) (\d+)/);
						if (!card_match) continue;

						const [_, _copies, card_name, set, num] = card_match;
						const copies = parseInt(_copies);
						const card_obj = {card_name, set, num};

						if (collection.has(card_obj)) collection.set(card_obj, collection.get(card_obj) + copies);
						else collection.set(card_obj, copies);
					}
					
					let openedText = ''
					const opened = [];
					for (const card of card_list_arrayified) {
						for (const [collection_card, copies]  of collection.entries()) {
							if (card.set == collection_card.set && card.card_name == collection_card.card_name && card.number == collection_card.num) {
								for (let i = 0; i < copies; i++)
									opened.push(card);
								openedText += `${copies} ${card.card_name} (${card.set}) ${card.number}\n`;
								collection.delete(collection_card);
							}							
						}
					}
					for (const card of card_list_arrayified) {
						for (const [collection_card, copies]  of collection.entries()) {
							if (card.set == collection_card.set && card.card_name == collection_card.card_name) {
								for (let i = 0; i < copies; i++)
									opened.push(card);
								openedText += `${copies} ${card.card_name} (${card.set}) ${card.number}\n`;
								collection.delete(collection_card);
							}							
						}
					}
					for (const card of card_list_arrayified) {
						for (const [collection_card, copies]  of collection.entries()) {
							if (card.card_name == collection_card.card_name) {
								for (let i = 0; i < copies; i++)
									opened.push(card);
								openedText += `${copies} ${card.card_name} (${card.set}) ${card.number}\n`;
								collection.delete(collection_card);
							}							
						}
					}
					
					opened.sort((a, b) => {
						if (a.type.includes('Basic') && !b.type.includes('Basic')) return 1;
						if (!a.type.includes('Basic') && b.type.includes('Basic')) return -1;
						const rarity_sort_order = ["mythic", "rare", "uncommon", "common"];
						let a_rarity_index = 100;
						let b_rarity_index = 100;

						for (const [i, rarity] of rarity_sort_order.entries()) {
							if (a.rarity.toLowerCase() == rarity)
								a_rarity_index = i;
							if (b.rarity.toLowerCase() == rarity)
								b_rarity_index = i;	
						}

						return a_rarity_index - b_rarity_index;
					});

					const deck_container = document.querySelector('.deck-view');
					for (const card of opened) {
						const container = buildImgContainer(card);
						const link = container.querySelector('a');
						link.removeAttribute('href');
						link.style.cursor = 'pointer';
						link.onclick = () => {
							document.querySelector('.card-preview').src = link.querySelector('img').src;
						}
						deck_container.appendChild(container);
					}

					localStorage.setItem('colls.pulls', openedText);
					document.querySelector('#modal-container').style.overflow = 'auto';
					document.querySelector('#jmp1').style.display = 'none';
					document.querySelector('#jmp2').style.display = 'none';
				}

				container.appendChild(pack_img);
				container.appendChild(face_card);
				jmp_container.appendChild(container);
			}
		}

		function changeTab(tab_name) {
			document.getElementById(tab_name).style.display = "grid";
			document.getElementById(tab_name + "-tab-select").className = "tab-btn tab-btn-active"
			for (const child of document.getElementById("main-tab").children) {
				if (child.id != tab_name && child.id != "ended-text") {
					child.style.display = "none";
				}
			}
			for (const child of document.getElementById("tab-select").children) {
				if (child.id != tab_name + "-tab-select") {
					child.className = "tab-btn";
				}
			}
		}

		function endJumpstart() {
			document.getElementById("modal-container").style.display = 'none';
		}

		document.getElementById("search").addEventListener("keypress", function (event) {
			if (event.key === "Enter") {
				event.preventDefault();
				const url = new URL('search', window.location.origin);
				url.searchParams.append('search', document.getElementById("search").value);
				window.location.href = url;
			}
		});
		function randomCard() {
			let i = Math.floor(Math.random() * (card_list_arrayified.length + 1));
			let random_card = card_list_arrayified[i];

			const url = new URL('card', window.location.origin);
			const params = {
				set: random_card.set,
				num: random_card.number,
				name: random_card.card_name
			}
			for (const key in params) {
				url.searchParams.append(key, params[key]);
			}

			window.location.href = url;
		}
	</script>
